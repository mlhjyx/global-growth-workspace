# lead 域 REST API（母本 11.12 分组：/icps /accounts /contacts /leads —— ICP、购买委员会、客户、评分、信号和决策）
# 负责域：lead；schema_version=1；需求追踪：LED-001..014（母本 7.5）
# 公约（conventions.md / 母本 11.15、11.16）：
# - 所有写操作要求 Idempotency-Key 头；更新用 If-Match 乐观锁，冲突返回 409 VERSION_CONFLICT
# - 错误模型统一 { error_code, message, details?, retryable, policy_reason_codes? }
# - 列表统一 cursor 分页：?cursor=&limit= → { items, next_cursor }
# - 联系人字段脱敏受 Policy 控制：各 operation 的 description 标注 Policy 动作（x-policy-action）
openapi: 3.1.0
info:
  title: Lead Domain API
  version: 1.0.0
  description: |
    ICP、购买委员会、Account/Contact、Lead 评分/信号/决策 REST 契约（母本 7.5，LED-001..014）。
    对象 Schema 权威定义在 ../json-schema/lead/；状态取值与 state-machines/lead.state.ts、icp.state.ts 一致。
    联系人明文联系方式仅当 Policy 动作 contact.contact_point.view（母本 8.10 VIEW）判定 Allow 时返回，
    否则只返回 value_masked（LED-013 验收：未授权角色只能看到脱敏字段）。

servers:
  - url: /api/v1
    description: BFF/API Gateway（母本 11.18）

tags:
  - name: icps
    description: ICP 定义、Persona、购买委员会角色、资格规则、回测与激活（LED-001..005）
  - name: accounts
    description: 目标企业、身份解析合并/拆分、信号（LED-010/012/014）
  - name: contacts
    description: 联系人、验证与脱敏、按需揭示、抑制（LED-013、母本 8.9）
  - name: leads
    description: 线索、评分、队列与决策（LED-006..009/011）

paths:
  /icps:
    get:
      tags: [icps]
      operationId: listIcps
      summary: 列出 ICP
      description: LED-001。cursor 分页。x-policy-action：icp.view
      x-policy-action: icp.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          description: 按状态过滤（取值见 state-machines/icp.state.ts）
          schema:
            type: string
            enum: [DRAFT, HYPOTHESIS, VALIDATING, ACTIVE, SUPERSEDED, ARCHIVED]
      responses:
        '200':
          description: ICP 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/icp-definition.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [icps]
      operationId: createIcp
      summary: 创建 ICP（初始状态 DRAFT）
      description: LED-001：字段结构化且可版本化。x-policy-action：icp.create
      x-policy-action: icp.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/icp-definition.schema.json'
            # id/created_at/updated_at/version/status 由服务端生成，请求中提供将被忽略
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/icp-definition.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    get:
      tags: [icps]
      operationId: getIcp
      summary: 获取 ICP
      description: LED-001。x-policy-action：icp.view
      x-policy-action: icp.view
      responses:
        '200':
          description: ICP 详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/icp-definition.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      tags: [icps]
      operationId: updateIcp
      summary: 更新 ICP（乐观锁）
      description: |
        LED-001/003。If-Match 乐观锁（母本 11.16），冲突返回 409 VERSION_CONFLICT（母本 11.15）。
        ACTIVE 状态下的重大变更应创建新 ICP 并激活取代（母本 7.5.4：不静默影响运行中 Campaign），
        直接修改 ACTIVE ICP 的 criteria/exclusions 返回 403 ACTION_DENIED。x-policy-action：icp.update
      x-policy-action: icp.update
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/icp-definition.schema.json'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/icp-definition.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}/backtests:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    post:
      tags: [icps]
      operationId: runIcpBacktest
      summary: 运行 ICP 回测
      description: |
        LED-004：使用样例账户、公开数据或历史结果回测；触发 HYPOTHESIS→VALIDATING。
        回测消耗 Provider 预算，超限返回 BUDGET_EXCEEDED（母本 11.15）。x-policy-action：icp.backtest
      x-policy-action: icp.backtest
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [SAMPLE_ACCOUNTS, PUBLIC_DATA, HISTORICAL_RESULTS]
                  description: 回测方法（LED-004）
                dataset_ref:
                  type: string
                  description: 样例账户列表 / 数据快照引用
              required: [method]
              additionalProperties: false
      responses:
        '202':
          description: 回测任务已受理；完成后结果写入 ICPDefinition.backtests
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                required: [task_id]
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}/activate:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    post:
      tags: [icps]
      operationId: activateIcp
      summary: 激活 ICP
      description: |
        LED-004：仅 VALIDATING 且回测通过的 ICP 可激活，未回测返回 403 ACTION_DENIED（未回测 ICP 保持 HYPOTHESIS）。
        成功发布 ICPActivated 事件；supersedes_icp_id 存在时旧 ICP 转 SUPERSEDED，
        引用旧 ICP 的运行中 Campaign 进入显式确认（母本 7.5.4）。x-policy-action：icp.activate
      x-policy-action: icp.activate
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                supersedes_icp_id:
                  type: string
                  pattern: '^icp_[0-9A-HJKMNP-TV-Z]{26}$'
                  description: 被取代的旧 ICP
              additionalProperties: false
      responses:
        '200':
          description: 已激活
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/icp-definition.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}/personas:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    get:
      tags: [icps]
      operationId: listPersonas
      summary: 列出 ICP 的 Persona
      description: LED-001。x-policy-action：icp.view
      x-policy-action: icp.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Persona 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/persona.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [icps]
      operationId: createPersona
      summary: 创建 Persona
      description: LED-001。x-policy-action：icp.update
      x-policy-action: icp.update
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/persona.schema.json'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/persona.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}/buying-committee-roles:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    get:
      tags: [icps]
      operationId: listBuyingCommitteeRoles
      summary: 列出购买委员会角色
      description: LED-002：决策者/影响者/使用者/技术/财务/采购；可按 Growth Motion 过滤模板。x-policy-action：icp.view
      x-policy-action: icp.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: growth_motion
          in: query
          description: 按 Growth Motion 过滤（母本 3.3，如 GM-ABO）
          schema:
            type: string
            pattern: '^GM-[A-Z]{2,4}$'
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/buying-committee-role.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [icps]
      operationId: createBuyingCommitteeRole
      summary: 创建购买委员会角色
      description: LED-002。x-policy-action：icp.update
      x-policy-action: icp.update
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/buying-committee-role.schema.json'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/buying-committee-role.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /icps/{icp_id}/qualification-rules:
    parameters:
      - $ref: '#/components/parameters/IcpId'
    get:
      tags: [icps]
      operationId: listQualificationRules
      summary: 列出资格规则
      description: LED-003/007。x-policy-action：icp.view
      x-policy-action: icp.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 规则列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/qualification-rule.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [icps]
      operationId: createQualificationRule
      summary: 创建资格规则
      description: LED-003：HARD_EXCLUSION 优先于正向评分；LED-007：模型不能覆盖硬性排除。x-policy-action：icp.update
      x-policy-action: icp.update
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/qualification-rule.schema.json'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/qualification-rule.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /accounts:
    get:
      tags: [accounts]
      operationId: listAccounts
      summary: 列出 Account
      description: 母本 7.5.2。cursor 分页。x-policy-action：account.view
      x-policy-action: account.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: country
          in: query
          schema:
            type: string
            pattern: '^[A-Z]{2}$'
        - name: domain
          in: query
          description: 按规范化域名精确匹配
          schema:
            type: string
        - name: icp_id
          in: query
          description: 过滤命中指定 ICP 的 Account
          schema:
            type: string
            pattern: '^icp_[0-9A-HJKMNP-TV-Z]{26}$'
      responses:
        '200':
          description: Account 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/account.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [accounts]
      operationId: createAccount
      summary: 创建 Account（手工/导入）
      description: |
        母本 7.4.12：客户自带数据导入必须排重；服务端执行身份解析，命中已有实体时返回 409 VERSION_CONFLICT
        并附 details.duplicate_account_id。x-policy-action：account.create
      x-policy-action: account.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/account.schema.json'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/account.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /accounts/{account_id}:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [accounts]
      operationId: getAccount
      summary: 获取 Account
      description: |
        母本 7.5.4：来源、更新时间可见（字段级证据经 /field-evidence 查询，受 Data Rights Policy VIEW 控制，
        LICENSE_RESTRICTED 时不返回受限字段，母本 11.15）。x-policy-action：account.view
      x-policy-action: account.view
      responses:
        '200':
          description: Account 详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/account.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      tags: [accounts]
      operationId: updateAccount
      summary: 更新 Account（乐观锁）
      description: If-Match 乐观锁（母本 11.16）。x-policy-action：account.update
      x-policy-action: account.update
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/account.schema.json'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/account.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /accounts/{account_id}/merge:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [accounts]
      operationId: mergeAccounts
      summary: 合并 Account
      description: |
        LED-010：合并可审计和撤销；母本 11.16 可回放命令。path 中的 account_id 为合并后的主实体。
        低置信合并进入人工审核（母本 DAT-009）。成功发布 EntityResolved 事件。x-policy-action：account.merge
      x-policy-action: account.merge
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_account_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^acc_[0-9A-HJKMNP-TV-Z]{26}$'
                  description: 被并入的 Account
                reason:
                  type: string
              required: [source_account_ids]
              additionalProperties: false
      responses:
        '200':
          description: 合并完成；merge_history 追加 MERGE 条目
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/account.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /accounts/{account_id}/split:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [accounts]
      operationId: splitAccount
      summary: 拆分 Account（含撤销合并）
      description: |
        LED-010：拆分可审计；undo_of_operation_id 指定时为撤销既有合并（UNDO_MERGE）。
        成功发布 EntityResolved 事件；下游引用按事件更新，不破坏既有 Campaign/Conversation/Opportunity
        （母本 7.4.10）。x-policy-action：account.split
      x-policy-action: account.split
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                undo_of_operation_id:
                  type: string
                  description: 要撤销的 merge_history.operation_id；为空表示按 source_record 划分新实体
                reason:
                  type: string
              additionalProperties: false
      responses:
        '200':
          description: 拆分完成，返回结果实体集合
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/account.schema.json'
                required: [items]
        default:
          $ref: '#/components/responses/ErrorDefault'

  /accounts/{account_id}/signals:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [accounts]
      operationId: listAccountSignals
      summary: 列出企业信号
      description: LED-014：贸易/招聘/融资/网站/内容/关系变化/活动信号；过期信号 status=EXPIRED。x-policy-action：account.view
      x-policy-action: account.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: signal_type
          in: query
          schema:
            type: string
            enum: [TRADE, HIRING, FUNDING, WEBSITE, CONTENT, RELATIONSHIP_CHANGE, EVENT]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, REVOKED]
      responses:
        '200':
          description: 信号列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/signal.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'

  /contacts:
    get:
      tags: [contacts]
      operationId: listContacts
      summary: 列出联系人
      description: |
        LED-013：contact_points 默认脱敏——仅返回 value_masked/verification_status，不含 value 明文。
        明文需逐个联系人调用 POST /contacts/{contact_id}/reveal。x-policy-action：contact.view
      x-policy-action: contact.view
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: account_id
          in: query
          schema:
            type: string
            pattern: '^acc_[0-9A-HJKMNP-TV-Z]{26}$'
        - name: buying_role
          in: query
          schema:
            type: string
            enum: [DECISION_MAKER, INFLUENCER, USER, TECHNICAL, FINANCE, PROCUREMENT]
      responses:
        '200':
          description: 联系人列表（脱敏）
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/lead/contact.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      tags: [contacts]
      operationId: createContact
      summary: 创建联系人（手工/导入）
      description: |
        母本 7.4.12 导入排重；创建即执行 Suppression 检查，命中全局抑制时仍可保存但 suppression.suppressed=true，
        不进入发送队列（母本 4.5.5）。x-policy-action：contact.create
      x-policy-action: contact.create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../json-schema/lead/contact.schema.json'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/contact.schema.json'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /contacts/{contact_id}:
    parameters:
      - $ref: '#/components/parameters/ContactId'
    get:
      tags: [contacts]
      operationId: getContact
      summary: 获取联系人（脱敏）
      description: |
        LED-013 验收：未授权角色只能看到脱敏字段——contact_points[].value 仅当
        Policy 动作 contact.contact_point.view（母本 8.10 VIEW）判定 Allow 时返回，否则省略、仅返回 value_masked。
        导出另受 contact.export（母本 8.10 EXPORT）控制，拒绝返回 403 LICENSE_RESTRICTED/ACTION_DENIED。
        x-policy-action：contact.view
      x-policy-action: contact.view
      responses:
        '200':
          description: 联系人详情（明文字段按 Policy 裁剪）
          content:
            application/json:
              schema:
                $ref: '../json-schema/lead/contact.schema.json'
        default:
