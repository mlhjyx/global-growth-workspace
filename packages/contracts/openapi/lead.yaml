                    type: string
                    enum: [NOT_ICP_FIT, WRONG_ROLE, BAD_DATA, ALREADY_CUSTOMER, COMPETITOR, BAD_TIMING, DUPLICATE, COMPLIANCE_RISK, OTHER]
                  description: decision=REJECTED 时必填
                reason_note:
                  type: string
                dry_run:
                  type: boolean
                  description: true=仅预览差异不执行（LED-008）
              required: [lead_ids, decision, dry_run]
              additionalProperties: false
      responses:
        '200':
          description: dry_run 预览或执行结果明细
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    description: 批次 ID（母本 11.16）；dry_run 时为空
                  preview:
                    type: array
                    description: 每条 Lead 的差异（LED-008：批量操作前展示差异）
                    items:
                      type: object
                      properties:
                        lead_id:
                          type: string
                        current_status:
                          type: string
                          enum: [DISCOVERED, ENRICHING, REVIEW, QUALIFIED, REJECTED, SUPPRESSED, CONTACTED, CONVERTED]
                        current_queue:
                          type: string
                          enum: [RECOMMENDED, NEEDS_CONFIRMATION, REJECTED, DO_NOT_CONTACT]
                        target_status:
                          type: string
                          enum: [QUALIFIED, REJECTED]
                        total_priority:
                          type: number
                        risk_flags:
                          type: array
                          items:
                            type: string
                        will_apply:
                          type: boolean
                          description: false=该条不可执行（非 REVIEW 状态 / 已抑制），附 skip_reason
                        skip_reason:
                          type: string
                      required: [lead_id, current_status, target_status, will_apply]
                      additionalProperties: false
                  succeeded:
                    type: array
                    items:
                      type: string
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        lead_id:
                          type: string
                        error_code:
                          type: string
                        message:
                          type: string
                      required: [lead_id, error_code]
                      additionalProperties: false
                required: [preview]
        default:
          $ref: '#/components/responses/ErrorDefault'

  /leads/export:
