                  audit_id:
                    type: string
                required: [task_id, audit_id]
        default:
          $ref: '#/components/responses/ErrorDefault'

components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 稳定幂等键（母本 11.16：所有写操作必带；重复请求返回首个结果）
      schema:
        type: string
        maxLength: 255
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 乐观锁版本（母本 11.16 optimistic locking）；不匹配返回 409 VERSION_CONFLICT 与当前版本 Diff（母本 11.15）
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      description: 游标分页（conventions.md 统一分页）
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IcpId:
      name: icp_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^icp_[0-9A-HJKMNP-TV-Z]{26}$'
    AccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^acc_[0-9A-HJKMNP-TV-Z]{26}$'
    ContactId:
      name: contact_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^cta_[0-9A-HJKMNP-TV-Z]{26}$'
    LeadId:
      name: lead_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^led_[0-9A-HJKMNP-TV-Z]{26}$'

  schemas:
    Error:
      type: object
      description: 统一错误模型（母本 11.15；conventions.md）
      properties:
        error_code:
          type: string
          description: 机器码（母本 11.15），如 INVALID_SCHEMA、TOKEN_EXPIRED、ACTION_DENIED、AUTHORIZATION_REQUIRED、PROVIDER_RATE_LIMIT、BUDGET_EXCEEDED、PROVIDER_UNAVAILABLE、UNSUPPORTED_OPERATION、LICENSE_RESTRICTED、COMPLIANCE_REVIEW_REQUIRED、CIRCUIT_BREAKER_OPEN、VERSION_CONFLICT
        message:
          type: string
          description: 人类可读说明（中文）
        details:
          type: object
          description: 字段级错误 / 冲突 Diff / 重复实体 ID 等上下文
        retryable:
          type: boolean
        policy_reason_codes:
          type: array
          items:
            type: string
          description: Policy Deny 原因码（母本 8.10 Policy Engine 输出）
      required: [error_code, message, retryable]
      additionalProperties: false

  responses:
    ErrorDefault:
      description: |
        统一错误（母本 11.15）：400 INVALID_SCHEMA / 401 TOKEN_EXPIRED / 403 ACTION_DENIED、LICENSE_RESTRICTED、
        AUTHORIZATION_REQUIRED / 404 资源不存在 / 409 VERSION_CONFLICT / 422 COMPLIANCE_REVIEW_REQUIRED /
        429 PROVIDER_RATE_LIMIT / 402 BUDGET_EXCEEDED / 503 PROVIDER_UNAVAILABLE、CIRCUIT_BREAKER_OPEN
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    VersionConflict:
      description: 乐观锁冲突（母本 11.15 Conflict：返回当前版本和 Diff，用户合并或创建 Revision）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
