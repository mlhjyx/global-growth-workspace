      type: object
      description: WSP-007 触发控制开关；target 约束见 control-switch.schema.json allOf
      properties:
        switch_type:
          type: string
          enum: [KILL_SWITCH, CAMPAIGN_PAUSE, PROVIDER_DISABLE]
        target_id:
          type: string
          minLength: 1
