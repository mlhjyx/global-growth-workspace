        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: budget_category
          in: query
          schema:
            type: string
            enum: [MODEL, DATA, MEDIA, EMAIL, EXPERT]
        - name: health_status
          in: query
          description: 按健康度过滤（state-machines/budget.state.ts）
          schema:
            type: string
            enum: [OK, WARNING, EXCEEDED]
      responses:
        '200':
          description: 预算列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/budget.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createBudget
      tags: [budgets]
      summary: 创建预算
      description: "WSP-005。五类预算（MODEL/DATA/MEDIA/EMAIL/EXPERT）；记审计 BUDGET_CHANGE（WSP-010）。policy: budget.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/budget.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/budgets/{budget_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - name: budget_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^bud_[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      operationId: getBudget
      tags: [budgets]
      summary: 获取预算（含用量投影）
      description: "WSP-005。policy: budget.read"
      responses:
        '200':
          description: 预算详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/budget.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updateBudget
      tags: [budgets]
      summary: 更新预算（限额/阈值/归档）
      description: |
        WSP-005。上调硬限制可触发 BudgetRecovered；变更命中审批规则 BUDGET_CHANGE 时需
        Approval Token（WSP-006）。乐观锁 If-Match=version。policy: budget.manage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/budget.schema.json'
        '403':
          $ref: '#/components/responses/ApprovalRequired'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/approval-rules:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: listApprovalRules
