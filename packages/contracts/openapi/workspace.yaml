# workspace 域 REST API（OpenAPI 3.1）
# 负责域：workspace | schema_version: 1
# 来源：母本 7.1（WSP-001..010）、11.12 API 分组（/workspaces：组织、成员、品牌、策略、预算和审计）、
#       11.15 错误模型、11.16 幂等与乐观锁。
# 约定：所有写操作要求 Idempotency-Key 头；更新用 If-Match（version）乐观锁，冲突返回 VERSION_CONFLICT；
#       列表统一 cursor 分页 { items, next_cursor }；错误统一 { error_code, message, details?, retryable, policy_reason_codes? }。
openapi: 3.1.0
info:
  title: Workspace Domain API
  version: 1.0.0
  description: |
    组织、Workspace、品牌、成员、权限、策略、预算、审批规则、审计与控制开关（母本 7.1、11.12 /workspaces 分组）。
    所有端点按 workspace_id 强制租户隔离（WSP-001 验收、ADR-001）。

servers:
  - url: /api/v1
    description: BFF/API Gateway（母本 11.18）

security:
  - bearerAuth: []

tags:
  - name: organizations
    description: 组织（WSP-001、WSP-004）
  - name: workspaces
    description: Workspace 生命周期（WSP-001、WSP-008）
  - name: brands
    description: 品牌（WSP-001）
  - name: memberships
    description: 成员与角色（WSP-002、WSP-004、WSP-009）
  - name: permission-grants
    description: RBAC + ABAC 授权（WSP-003）
  - name: policies
    description: Workspace 策略（WSP-003）
  - name: budgets
    description: 预算与配额（WSP-005）
  - name: approval-rules
    description: 审批规则（WSP-006）
  - name: audit-logs
    description: 审计日志（WSP-010）
  - name: control-switches
    description: Kill Switch / Campaign Pause / Provider Disable（WSP-007）

paths:
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: 列出当前用户可见的组织
      description: "WSP-001/WSP-004。代理商可见其全部客户组织。policy: organization.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 组织列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/organization.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: 创建组织
      description: "WSP-001。创建企业或代理商顶层账户，发布 OrganizationCreated。policy: organization.create"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/organization.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /organizations/{organization_id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: 获取组织
      description: "WSP-001。policy: organization.read"
      responses:
        '200':
          description: 组织详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/organization.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: 更新组织
      description: "WSP-001。乐观锁 If-Match=version（母本 11.16）。policy: organization.configure"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/organization.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: 列出当前用户可访问的 Workspace
      description: "WSP-001/WSP-004。切换 Workspace 后缓存、搜索和任务上下文不泄漏（WSP-004 验收）。policy: workspace.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: organization_id
          in: query
          description: 按组织过滤
          schema:
            type: string
            pattern: '^org_[0-9A-HJKMNP-TV-Z]{26}$'
      responses:
        '200':
          description: Workspace 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/workspace.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: 创建 Workspace
      description: "WSP-001。创建后所有对象自动带 workspace_id；发布 WorkspaceCreated。policy: workspace.create"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: 获取 Workspace
      description: "WSP-001。policy: workspace.read"
      responses:
        '200':
          description: Workspace 详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: 更新 Workspace 设置
      description: "WSP-001/WSP-008（保留期设置）。乐观锁 If-Match=version。设置变更记审计 WORKSPACE_SETTINGS_CHANGE（WSP-010）。policy: workspace.configure"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'
    delete:
      operationId: requestWorkspaceClose
      tags: [workspaces]
      summary: 请求关闭 Workspace（进入 CLOSING）
      description: |
        WSP-008 账户关闭流程：状态转 CLOSING（state-machines/workspace.state.ts），触发删除编排
        Durable Workflow（母本 11.17），发布 WorkspaceCloseRequested；记审计 ACCOUNT_CLOSE_REQUESTED。
        高风险动作，命中审批规则时需有效 Approval Token（WSP-006）。policy: workspace.close
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '202':
          description: 关闭请求已受理，返回删除编排 Workflow ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace_id:
                    type: string
                    pattern: '^ws_[0-9A-HJKMNP-TV-Z]{26}$'
                  deletion_workflow_id:
                    type: string
                required: [workspace_id, deletion_workflow_id]
                additionalProperties: false
        '403':
          $ref: '#/components/responses/ApprovalRequired'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/brands:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: listBrands
      tags: [brands]
      summary: 列出品牌
      description: "WSP-001。policy: brand.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 品牌列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/brand.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createBrand
      tags: [brands]
      summary: 创建品牌
      description: "WSP-001。发布 BrandCreated。policy: brand.create"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/brand.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/brands/{brand_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - name: brand_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^brd_[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      operationId: getBrand
      tags: [brands]
      summary: 获取品牌
      description: "WSP-001。policy: brand.read"
      responses:
        '200':
          description: 品牌详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/brand.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updateBrand
      tags: [brands]
      summary: 更新品牌
      description: "WSP-001。乐观锁 If-Match=version。policy: brand.update"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/brand.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/memberships:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: listMemberships
      tags: [memberships]
      summary: 列出成员
      description: "WSP-002。policy: membership.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          description: 按状态过滤（state-machines/membership.state.ts）
          schema:
            type: string
            enum: [INVITED, ACTIVE, SUSPENDED, REMOVED]
        - name: role
          in: query
          description: 按角色过滤（WSP-002）
          schema:
            $ref: '../json-schema/workspace/membership.schema.json#/$defs/role'
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/membership.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: inviteMembership
      tags: [memberships]
      summary: 邀请成员（创建 INVITED 状态的 Membership）
      description: "WSP-002/WSP-004。发布 MembershipChanged(change_type=INVITED)；记审计 MEMBER_INVITED（WSP-010）。policy: membership.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembershipCreate'
      responses:
        '201':
          description: 已邀请
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/membership.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/memberships/{membership_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - name: membership_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^mem_[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      operationId: getMembership
      tags: [memberships]
      summary: 获取成员
      description: "WSP-002。policy: membership.read"
      responses:
        '200':
          description: 成员详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/membership.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updateMembership
      tags: [memberships]
      summary: 更新成员角色/状态
      description: |
        WSP-002。状态转移须符合 state-machines/membership.state.ts；角色变更发布
        MembershipChanged(change_type=ROLE_CHANGED)，记审计 ROLE_CHANGE；权限变更立即影响新请求，
        运行中的高风险任务重新校验（母本 7.1.4）。乐观锁 If-Match=version。policy: membership.manage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembershipUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/membership.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'
    delete:
      operationId: removeMembership
      tags: [memberships]
      summary: 移除成员（状态转 REMOVED）
      description: "WSP-002/WSP-009。发布 MembershipChanged(change_type=REMOVED)；记审计 MEMBER_REMOVED。policy: membership.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: 已移除
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/permission-grants:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: listPermissionGrants
      tags: [permission-grants]
      summary: 列出权限授予
      description: "WSP-003。policy: permission_grant.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: subject_type
          in: query
          schema:
            type: string
            enum: [ROLE, MEMBERSHIP]
        - name: resource_type
          in: query
          schema:
            $ref: '../json-schema/workspace/permission-grant.schema.json#/$defs/resource_type'
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, REVOKED]
      responses:
        '200':
          description: 授权列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/permission-grant.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createPermissionGrant
      tags: [permission-grants]
      summary: 创建权限授予
      description: "WSP-003。发布 PermissionGrantChanged(CREATED)；记审计 PERMISSION_CHANGE（WSP-010）。policy: permission_grant.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionGrantCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/permission-grant.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/permission-grants/{grant_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - name: grant_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^pgr_[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      operationId: getPermissionGrant
      tags: [permission-grants]
      summary: 获取权限授予
      description: "WSP-003。policy: permission_grant.read"
      responses:
        '200':
          description: 授权详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/permission-grant.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updatePermissionGrant
      tags: [permission-grants]
      summary: 更新权限授予
      description: "WSP-003。发布 PermissionGrantChanged(UPDATED)。乐观锁 If-Match=version。policy: permission_grant.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionGrantUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/permission-grant.schema.json'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'
    delete:
      operationId: revokePermissionGrant
      tags: [permission-grants]
      summary: 撤销权限授予（status 转 REVOKED）
      description: "WSP-003。发布 PermissionGrantChanged(REVOKED)；立即影响新请求（母本 7.1.4）。policy: permission_grant.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: 已撤销
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/policies:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      operationId: listPolicies
      tags: [policies]
      summary: 列出 Workspace 策略
      description: "WSP-003。policy: policy.read"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: policy_type
          in: query
          schema:
            type: string
            enum: [DATA_RIGHTS, PRIVACY_COMPLIANCE, MODEL_ROUTING, CONTENT_GOVERNANCE, CHANNEL_GOVERNANCE, OUTREACH_LIMIT, EXPORT_CONTROL, RETENTION, APPROVAL_GOVERNANCE, BUDGET_ENFORCEMENT]
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, ARCHIVED]
      responses:
        '200':
          description: 策略列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '../json-schema/workspace/workspace-policy.schema.json'
                  next_cursor:
                    type: [string, 'null']
                required: [items, next_cursor]
                additionalProperties: false
        default:
          $ref: '#/components/responses/ErrorDefault'
    post:
      operationId: createPolicy
      tags: [policies]
      summary: 创建策略
      description: "WSP-003。发布 PolicyUpdated(CREATED)；记审计 POLICY_CHANGE（WSP-010）。高风险变更可命中审批规则（WSP-006 POLICY_CHANGE）。policy: policy.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreate'
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace-policy.schema.json'
        '400':
          $ref: '#/components/responses/InvalidSchema'
        '403':
          $ref: '#/components/responses/ApprovalRequired'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/policies/{policy_id}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - name: policy_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^pol_[0-9A-HJKMNP-TV-Z]{26}$'
    get:
      operationId: getPolicy
      tags: [policies]
      summary: 获取策略
      description: "WSP-003。policy: policy.read"
      responses:
        '200':
          description: 策略详情
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace-policy.schema.json'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/ErrorDefault'
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: 更新策略
      description: "WSP-003。发布 PolicyUpdated(UPDATED)；策略引擎缓存失效。乐观锁 If-Match=version。policy: policy.manage"
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpdate'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '../json-schema/workspace/workspace-policy.schema.json'
        '403':
          $ref: '#/components/responses/ApprovalRequired'
        '409':
          $ref: '#/components/responses/VersionConflict'
        default:
          $ref: '#/components/responses/ErrorDefault'

  /workspaces/{workspace_id}/budgets:
