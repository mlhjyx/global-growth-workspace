# workspace 域领域事件（AsyncAPI 3.0）
# 负责域：workspace | schema_version: 全部为 1
# 来源：母本 7.1（WSP-001..010）、11.10 事件 Envelope、11.11 关键业务事件（企业与知识行：WorkspaceCreated；专家与治理行：BudgetExceeded）
# 约定：所有消息 payload = 公共 Envelope（json-schema/common/envelope.schema.json）+ 各事件业务 payload；
#       至少一次投递、消费者幂等（母本 ADR-009）；payload 只放 ID 与变更要点，不放可查询的完整对象。
# 注意：CAMPAIGN_PAUSE 型 ControlSwitch 触发的 CampaignPaused/CampaignResumed 属 campaign 域事件
#       （母本 11.11 Campaign 行），在 asyncapi/campaign.events.yaml 定义，本文件不重复定义。
asyncapi: 3.0.0
info:
  title: Workspace Domain Events
  version: 1.0.0
  description: |
    workspace 域（Organization/Workspace/Brand/Membership/PermissionGrant/WorkspacePolicy/Budget/ApprovalRule/ControlSwitch）
    的全部领域事件。母本 7.1、11.10、11.11。事件名 PascalCase + schema_version（母本 0.5）。
defaultContentType: application/json

channels:
  workspace-events:
    address: ggw.workspace.v1.events
    description: workspace 域事件通道（Outbox 投递，母本 11.14）
    messages:
      OrganizationCreated:
        $ref: '#/components/messages/OrganizationCreated'
      WorkspaceCreated:
        $ref: '#/components/messages/WorkspaceCreated'
      WorkspaceSuspended:
        $ref: '#/components/messages/WorkspaceSuspended'
      WorkspaceResumed:
        $ref: '#/components/messages/WorkspaceResumed'
      WorkspaceCloseRequested:
        $ref: '#/components/messages/WorkspaceCloseRequested'
      WorkspaceClosed:
        $ref: '#/components/messages/WorkspaceClosed'
      BrandCreated:
        $ref: '#/components/messages/BrandCreated'
      MembershipChanged:
        $ref: '#/components/messages/MembershipChanged'
      PermissionGrantChanged:
        $ref: '#/components/messages/PermissionGrantChanged'
      PolicyUpdated:
        $ref: '#/components/messages/PolicyUpdated'
      BudgetThresholdReached:
        $ref: '#/components/messages/BudgetThresholdReached'
      BudgetExceeded:
        $ref: '#/components/messages/BudgetExceeded'
      BudgetRecovered:
        $ref: '#/components/messages/BudgetRecovered'
      ApprovalRuleUpdated:
        $ref: '#/components/messages/ApprovalRuleUpdated'
      KillSwitchActivated:
        $ref: '#/components/messages/KillSwitchActivated'
      KillSwitchReleased:
        $ref: '#/components/messages/KillSwitchReleased'
      ProviderDisabled:
        $ref: '#/components/messages/ProviderDisabled'
      ProviderEnabled:
        $ref: '#/components/messages/ProviderEnabled'

operations:
  publish-workspace-events:
    action: send
    channel:
      $ref: '#/channels/workspace-events'
    summary: workspace-service 发布 workspace 域全部事件
    description: 生产者 workspace-service（Envelope.producer）；核心事务写业务表 + Outbox（母本 11.14）。

components:
  messages:
    OrganizationCreated:
      name: OrganizationCreated
      title: 组织已创建
      summary: WSP-001；组织（企业/代理商）顶层账户创建
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: OrganizationCreated
              schema_version:
                const: 1
              aggregate_type:
                const: Organization
              payload:
                $ref: '#/components/schemas/OrganizationCreatedPayload'

    WorkspaceCreated:
      name: WorkspaceCreated
      title: Workspace 已创建
      summary: WSP-001；母本 11.11 企业与知识行。创建后所有对象自动带 workspace_id
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: WorkspaceCreated
              schema_version:
                const: 1
              aggregate_type:
                const: Workspace
              payload:
                $ref: '#/components/schemas/WorkspaceCreatedPayload'

    WorkspaceSuspended:
      name: WorkspaceSuspended
      title: Workspace 已暂停
      summary: WSP-008/运营治理；状态机 ACTIVE->SUSPENDED（state-machines/workspace.state.ts）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: WorkspaceSuspended
              schema_version:
                const: 1
              aggregate_type:
                const: Workspace
              payload:
                $ref: '#/components/schemas/WorkspaceSuspendedPayload'

    WorkspaceResumed:
      name: WorkspaceResumed
      title: Workspace 已恢复
      summary: 状态机 SUSPENDED->ACTIVE（state-machines/workspace.state.ts）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: WorkspaceResumed
              schema_version:
                const: 1
              aggregate_type:
                const: Workspace
              payload:
                $ref: '#/components/schemas/WorkspaceResumedPayload'

    WorkspaceCloseRequested:
      name: WorkspaceCloseRequested
      title: Workspace 关闭已请求
      summary: WSP-008；状态机 ->CLOSING，触发删除编排 Durable Workflow（母本 11.17）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: WorkspaceCloseRequested
              schema_version:
                const: 1
              aggregate_type:
                const: Workspace
              payload:
                $ref: '#/components/schemas/WorkspaceCloseRequestedPayload'

    WorkspaceClosed:
      name: WorkspaceClosed
      title: Workspace 已关闭
      summary: WSP-008；状态机 CLOSING->CLOSED；删除状态可追踪到对象存储、向量库和 Provider
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: WorkspaceClosed
              schema_version:
                const: 1
              aggregate_type:
                const: Workspace
              payload:
                $ref: '#/components/schemas/WorkspaceClosedPayload'

    BrandCreated:
      name: BrandCreated
      title: 品牌已创建
      summary: WSP-001；Workspace 内新增品牌
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: BrandCreated
              schema_version:
                const: 1
              aggregate_type:
                const: Brand
              payload:
                $ref: '#/components/schemas/BrandCreatedPayload'

    MembershipChanged:
      name: MembershipChanged
      title: 成员资格已变更
      summary: WSP-002/004/009；覆盖邀请/激活/角色变更/停用/重新激活/移除，差异见 payload.change_type；权限变更立即影响新请求（母本 7.1.4）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: MembershipChanged
              schema_version:
                const: 1
              aggregate_type:
                const: Membership
              payload:
                $ref: '#/components/schemas/MembershipChangedPayload'

    PermissionGrantChanged:
      name: PermissionGrantChanged
      title: 权限授予已变更
      summary: WSP-003；RBAC+ABAC 授权创建/更新/撤销/过期；运行中的高风险任务需重新校验（母本 7.1.4）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: PermissionGrantChanged
              schema_version:
                const: 1
              aggregate_type:
                const: PermissionGrant
              payload:
                $ref: '#/components/schemas/PermissionGrantChangedPayload'

    PolicyUpdated:
      name: PolicyUpdated
      title: Workspace 策略已更新
      summary: WSP-003；策略创建/更新/归档；策略引擎缓存需失效
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: PolicyUpdated
              schema_version:
                const: 1
              aggregate_type:
                const: WorkspacePolicy
              payload:
                $ref: '#/components/schemas/PolicyUpdatedPayload'

    BudgetThresholdReached:
      name: BudgetThresholdReached
      title: 预算预警阈值已到达
      summary: WSP-005（超预算前预警）；预算健康 OK->WARNING（state-machines/budget.state.ts）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: BudgetThresholdReached
              schema_version:
                const: 1
              aggregate_type:
                const: Budget
              payload:
                $ref: '#/components/schemas/BudgetThresholdReachedPayload'

    BudgetExceeded:
      name: BudgetExceeded
      title: 预算硬限制已超出
      summary: WSP-005（超过硬限制时阻止新任务）；母本 11.11 专家与治理行、11.15 BUDGET_EXCEEDED；预算健康 ->EXCEEDED
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: BudgetExceeded
              schema_version:
                const: 1
              aggregate_type:
                const: Budget
              payload:
                $ref: '#/components/schemas/BudgetExceededPayload'

    BudgetRecovered:
      name: BudgetRecovered
      title: 预算健康已回落
      summary: WSP-005；预算上调/周期重置/用量修正后健康度回落（state-machines/budget.state.ts 回落转移）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: BudgetRecovered
              schema_version:
                const: 1
              aggregate_type:
                const: Budget
              payload:
                $ref: '#/components/schemas/BudgetRecoveredPayload'

    ApprovalRuleUpdated:
      name: ApprovalRuleUpdated
      title: 审批规则已变更
      summary: WSP-006；审批规则创建/更新/停用/过期/归档
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: ApprovalRuleUpdated
              schema_version:
                const: 1
              aggregate_type:
                const: ApprovalRule
              payload:
                $ref: '#/components/schemas/ApprovalRuleUpdatedPayload'

    KillSwitchActivated:
      name: KillSwitchActivated
      title: Kill Switch 已触发
      summary: WSP-007；Workspace 级停止，未开始任务不再执行，已执行项保留审计；下游执行服务必须消费本事件并停止调度
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: KillSwitchActivated
              schema_version:
                const: 1
              aggregate_type:
                const: ControlSwitch
              payload:
                $ref: '#/components/schemas/KillSwitchActivatedPayload'

    KillSwitchReleased:
      name: KillSwitchReleased
      title: Kill Switch 已解除
      summary: WSP-007；恢复 Workspace 执行类任务调度
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: KillSwitchReleased
              schema_version:
                const: 1
              aggregate_type:
                const: ControlSwitch
              payload:
                $ref: '#/components/schemas/KillSwitchReleasedPayload'

    ProviderDisabled:
      name: ProviderDisabled
      title: Provider 已停用
      summary: WSP-007；Workspace 内停用指定 Provider，路由与 Waterfall 需剔除（母本 7.4.8）
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: ProviderDisabled
              schema_version:
                const: 1
              aggregate_type:
                const: ControlSwitch
              payload:
                $ref: '#/components/schemas/ProviderDisabledPayload'

    ProviderEnabled:
      name: ProviderEnabled
      title: Provider 已恢复
      summary: WSP-007；解除 Provider 停用
      payload:
        allOf:
          - $ref: '../json-schema/common/envelope.schema.json'
          - type: object
            properties:
              event_type:
                const: ProviderEnabled
              schema_version:
                const: 1
              aggregate_type:
                const: ControlSwitch
              payload:
                $ref: '#/components/schemas/ProviderEnabledPayload'

  schemas:
    OrganizationCreatedPayload:
      type: object
      description: WSP-001；aggregate_id=organization_id（Envelope.workspace_id 此时为占位系统租户或首个 Workspace，见实现约定）
      properties:
        organization_id:
          type: string
          pattern: '^org_[0-9A-HJKMNP-TV-Z]{26}$'
        name:
          type: string
        org_type:
          type: string
          enum: [COMPANY, AGENCY]
        data_region:
          type: string
          enum: [CN, SG, US, EU]
      required: [organization_id, name, org_type, data_region]
      additionalProperties: false

    WorkspaceCreatedPayload:
      type: object
      description: WSP-001；创建后所有对象自动带 workspace_id
      properties:
        organization_id:
          type: string
          pattern: '^org_[0-9A-HJKMNP-TV-Z]{26}$'
        name:
          type: string
        data_region:
          type: string
          enum: [CN, SG, US, EU]
        default_locale:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/locale'
        business_type:
          type: string
          enum: [MANUFACTURER, TRADER, SAAS, PROFESSIONAL_SERVICE, BRAND_ECOMMERCE, AGENCY_SERVICE, OTHER]
        created_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
      required: [organization_id, name, data_region]
      additionalProperties: false

    WorkspaceSuspendedPayload:
      type: object
      description: 状态机 ACTIVE->SUSPENDED
      properties:
        reason:
          type: string
        suspended_by:
          type: string
          description: usr_ ID 或 system
      required: [suspended_by]
      additionalProperties: false

    WorkspaceResumedPayload:
      type: object
      description: 状态机 SUSPENDED->ACTIVE
      properties:
        resumed_by:
          type: string
          description: usr_ ID 或 system
      required: [resumed_by]
      additionalProperties: false

    WorkspaceCloseRequestedPayload:
      type: object
      description: WSP-008；触发删除编排（母本 11.17）
      properties:
        requested_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
        deletion_workflow_id:
          type: string
          description: Durable Workflow run ID，删除进度追踪入口
        scheduled_purge_at:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/timestamp'
      required: [requested_by]
      additionalProperties: false

    WorkspaceClosedPayload:
      type: object
      description: WSP-008；各存储删除状态见删除编排输出（PENDING/COMPLETED/FAILED/NOT_SUPPORTED/LEGAL_HOLD，母本 11.17）
      properties:
        deletion_workflow_id:
          type: string
          description: 删除编排 Workflow run ID
      required: [deletion_workflow_id]
      additionalProperties: false

    BrandCreatedPayload:
      type: object
      description: WSP-001
      properties:
        brand_id:
          type: string
          pattern: '^brd_[0-9A-HJKMNP-TV-Z]{26}$'
        name:
          type: string
        default_locale:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/locale'
      required: [brand_id, name]
      additionalProperties: false

    MembershipChangedPayload:
      type: object
      description: WSP-002/004/009；change_type 对齐 state-machines/membership.state.ts 转移
      properties:
        membership_id:
          type: string
          pattern: '^mem_[0-9A-HJKMNP-TV-Z]{26}$'
        user_id:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
        change_type:
          type: string
          enum: [INVITED, ACTIVATED, ROLE_CHANGED, SUSPENDED, REACTIVATED, REMOVED]
          description: INVITED=新邀请；ACTIVATED=INVITED->ACTIVE；ROLE_CHANGED=角色集合变更（无状态转移）；SUSPENDED=ACTIVE->SUSPENDED；REACTIVATED=SUSPENDED->ACTIVE；REMOVED=->REMOVED
        old_roles:
          type: array
          items:
            $ref: '../json-schema/workspace/membership.schema.json#/$defs/role'
          description: change_type=ROLE_CHANGED 时给出
        new_roles:
          type: array
          items:
            $ref: '../json-schema/workspace/membership.schema.json#/$defs/role'
        changed_by:
          type: string
          description: usr_ ID 或 system（SCIM 同步时为 system，WSP-009）
      required: [membership_id, user_id, change_type, changed_by]
      additionalProperties: false

    PermissionGrantChangedPayload:
      type: object
      description: WSP-003
      properties:
        grant_id:
          type: string
          pattern: '^pgr_[0-9A-HJKMNP-TV-Z]{26}$'
        change_type:
          type: string
          enum: [CREATED, UPDATED, REVOKED, EXPIRED]
        effect:
          type: string
          enum: [ALLOW, DENY]
        resource_type:
          $ref: '../json-schema/workspace/permission-grant.schema.json#/$defs/resource_type'
        actions:
          type: array
          items:
            $ref: '../json-schema/workspace/permission-grant.schema.json#/$defs/action'
        changed_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
      required: [grant_id, change_type, changed_by]
      additionalProperties: false

    PolicyUpdatedPayload:
      type: object
      description: WSP-003；消费者需失效策略缓存
      properties:
        policy_id:
          type: string
          pattern: '^pol_[0-9A-HJKMNP-TV-Z]{26}$'
        policy_type:
          type: string
          enum: [DATA_RIGHTS, PRIVACY_COMPLIANCE, MODEL_ROUTING, CONTENT_GOVERNANCE, CHANNEL_GOVERNANCE, OUTREACH_LIMIT, EXPORT_CONTROL, RETENTION, APPROVAL_GOVERNANCE, BUDGET_ENFORCEMENT]
        change_type:
          type: string
          enum: [CREATED, UPDATED, ARCHIVED]
        enforcement_mode:
          type: string
          enum: [ENFORCE, MONITOR, DISABLED]
        updated_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
      required: [policy_id, policy_type, change_type, updated_by]
      additionalProperties: false

    BudgetThresholdReachedPayload:
      type: object
      description: WSP-005 超预算前预警；每跨越一个阈值触发一次
      properties:
        budget_id:
          type: string
          pattern: '^bud_[0-9A-HJKMNP-TV-Z]{26}$'
        budget_category:
          type: string
          enum: [MODEL, DATA, MEDIA, EMAIL, EXPERT]
        threshold:
          type: number
          exclusiveMinimum: 0
          maximum: 1
          description: 被跨越的预警阈值（hard_limit 占比）
        spent:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/money'
        hard_limit:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/money'
        period_end:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/timestamp'
      required: [budget_id, budget_category, threshold, spent, hard_limit]
      additionalProperties: false

    BudgetExceededPayload:
      type: object
      description: WSP-005 超过硬限制时阻止新任务（母本 11.15 BUDGET_EXCEEDED）
      properties:
        budget_id:
          type: string
          pattern: '^bud_[0-9A-HJKMNP-TV-Z]{26}$'
        budget_category:
          type: string
          enum: [MODEL, DATA, MEDIA, EMAIL, EXPERT]
        spent:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/money'
        hard_limit:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/money'
        blocked_new_tasks:
          type: boolean
          description: 是否已开始阻止新任务（budget.block_on_hard_limit）
      required: [budget_id, budget_category, spent, hard_limit, blocked_new_tasks]
      additionalProperties: false

    BudgetRecoveredPayload:
      type: object
      description: WSP-005；健康度回落（state-machines/budget.state.ts）
      properties:
        budget_id:
          type: string
          pattern: '^bud_[0-9A-HJKMNP-TV-Z]{26}$'
        budget_category:
          type: string
          enum: [MODEL, DATA, MEDIA, EMAIL, EXPERT]
        new_health_status:
          type: string
          enum: [OK, WARNING]
        reason:
          type: string
          enum: [LIMIT_INCREASED, PERIOD_RESET, USAGE_CORRECTED]
      required: [budget_id, budget_category, new_health_status, reason]
      additionalProperties: false

    ApprovalRuleUpdatedPayload:
      type: object
      description: WSP-006
      properties:
        approval_rule_id:
          type: string
          pattern: '^apr_[0-9A-HJKMNP-TV-Z]{26}$'
        change_type:
          type: string
          enum: [CREATED, UPDATED, SUSPENDED, EXPIRED, ARCHIVED]
        governed_actions:
          type: array
          items:
            type: string
            enum: [CAMPAIGN_LAUNCH, CONTENT_PUBLISH, OUTBOUND_SEND, DATA_EXPORT, DATA_PURCHASE, CROSS_BORDER_MODEL_CALL, BUDGET_CHANGE, POLICY_CHANGE, MEMBER_ROLE_CHANGE, EXPERT_ENGAGEMENT, HIGH_RISK_REPLY]
        changed_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
      required: [approval_rule_id, change_type, changed_by]
      additionalProperties: false

    KillSwitchActivatedPayload:
      type: object
      description: WSP-007；停止后未开始任务不再执行，已执行项保留审计
      properties:
        control_switch_id:
          type: string
          pattern: '^csw_[0-9A-HJKMNP-TV-Z]{26}$'
        reason:
          type: string
        activated_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
        auto_release_at:
          $ref: '../json-schema/common/primitives.schema.json#/$defs/timestamp'
      required: [control_switch_id, reason, activated_by]
      additionalProperties: false

    KillSwitchReleasedPayload:
      type: object
      description: WSP-007
      properties:
        control_switch_id:
          type: string
          pattern: '^csw_[0-9A-HJKMNP-TV-Z]{26}$'
        released_by:
          type: string
          description: usr_ ID 或 system（auto_release_at 到点自动解除）
      required: [control_switch_id, released_by]
      additionalProperties: false

    ProviderDisabledPayload:
      type: object
      description: WSP-007；路由与 Waterfall 需剔除该 Provider（母本 7.4.8）
      properties:
        control_switch_id:
          type: string
          pattern: '^csw_[0-9A-HJKMNP-TV-Z]{26}$'
        provider_id:
          type: string
          description: Provider 注册 ID（母本 7.13）
        reason:
          type: string
        activated_by:
          type: string
          pattern: '^usr_[0-9A-HJKMNP-TV-Z]{26}$'
