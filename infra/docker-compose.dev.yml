# 本地开发依赖（ADR-103）。仅 dev 用途，密码为本地默认值、勿用于任何非本地环境。
# 起停：docker compose -f infra/docker-compose.dev.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ggw-postgres
    environment:
      POSTGRES_USER: ggw
      POSTGRES_PASSWORD: ggw_dev_local_only
      POSTGRES_DB: ggw
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ggw -d ggw']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ggw-redis
    ports:
      - '127.0.0.1:6379:6379'

# 按需引入（各自 ADR）：temporal、opa、minio(S3)、opensearch。
volumes:
  pgdata:
