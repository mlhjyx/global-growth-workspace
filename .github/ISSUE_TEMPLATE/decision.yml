    id: od
    attributes: { label: Open Decision ID, placeholder: 'OD-XX' }
  - type: textarea
    id: context
    attributes: { label: 背景 / 可选项与代价 / 阻塞什么 / 最晚关闭点 }
    validations: { required: true }
