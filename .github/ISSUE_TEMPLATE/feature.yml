name: Feature / Story
description: Epic 内的一个用户可感知功能
title: '[FEAT] '
labels: []
body:
  - type: input
    id: epic
    attributes: { label: 所属 Epic }
    validations: { required: true }
  - type: input
    id: requirements
    attributes: { label: 需求 ID }
    validations: { required: true }
  - type: textarea
    id: story
    attributes: { label: 用户故事与验收标准（Given/When/Then） }
    validations: { required: true }
  - type: dropdown
    id: risk
    attributes: { label: 风险分级, options: ['R0', 'R1', 'R2', 'R3'] }
    validations: { required: true }
